<section id="land-page">

    <mat-toolbar color="primary">
      <a pageScroll [pageScrollDuration]="300" [pageScrollOffset]="62" href="#land-page" class="logo">EXR</a>

        <a pageScroll [pageScrollDuration]="300" [pageScrollOffset]="62" href="#about-page">About</a>
        <a pageScroll [pageScrollDuration]="300" [pageScrollOffset]="62" href="#skills-page">Skills</a>
        <a pageScroll [pageScrollDuration]="300" [pageScrollOffset]="62" href="#work-page">Work</a>
        <a pageScroll [pageScrollDuration]="300" [pageScrollOffset]="62" href="#contact-page">Contact</a>
      </div>
      <div class="mobile-nav">
        <mat-expansion-panel mat-elevation-z0 hideToggle #mep="matExpansionPanel">
          <mat-expansion-panel-header>
            <mat-panel-title>
              <mat-icon class="menu-icon" aria-hidden="false" aria-label="icon">menu
              </mat-icon>
            </mat-panel-title>
          </mat-expansion-panel-header>

              href="#work-page">Work</a></p>
          <p><a (click)="mep.expanded = false;" pageScroll [pageScrollDuration]="300" [pageScrollOffset]="60"
              href="#contact-page">Contact</a></p>
        </mat-expansion-panel>
      </div>
    </mat-toolbar>
  </div>
  <app-home></app-home>
</section>

<section id="about-page">
  <app-about></app-about>
</section>

<section id="skills-page">
